<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e2a38;
    }

    .layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e2a38;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      min-height: 70px;
    }

    .sidebar.collapsed .sidebar-header {
      justify-content: center;
    }

    .sidebar-logo {
      width: 100%;
      max-width: 120px;
    }

    .sidebar.collapsed .sidebar-logo {
      width: 40px;
    }

    .collapse-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-nav a {
      display: block;
      padding: 0.75rem 1rem;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: #2d3b4f;
    }

    .sidebar.collapsed .sidebar-nav a {
      padding: 0.75rem 0.5rem;
      text-align: center;
      font-size: 0;
    }

    .sidebar.collapsed .sidebar-nav a::first-letter {
      font-size: 1.5rem;
    }

    /* Main content */
    .main-content {
      flex: 1;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .iframe-wrapper {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo" style="color:#fff;font-weight:bold;font-size:1.2rem;">LASIE</div>
        <button id="collapse-btn" class="collapse-btn" title="Collapse">☰</button>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="containers.html">Containers</a></li>
          <li><a href="tabulator.html">Tabulator</a></li>
          <li><a href="ai.html" class="active">AI Chat</a></li>
          <li><a href="calendar.html">Appointments</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <div class="iframe-wrapper">
        <iframe src="http://192.168.50.100:8000" title="Lemonade AI"></iframe>
      </div>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapse-btn');

    // Load saved state
    if (localStorage.getItem('sidebar-collapsed') === 'true') {
      sidebar.classList.add('collapsed');
    }

    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
    });
  </script>
</body>
</html>
